<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seguridad - Sistema de Activos Fijos</title>
    <link rel="stylesheet" href="css/estilos_proyectos.css">
</head>
<body>
    <div class="ventana-sistema">
        <header class="barra-titulo">SEGURIDAD</header>
        <div class="sub-header">SEGURIDAD</div>
        
        <form class="contenido-form">
            <div class="grupo-input">
                <label>USUARIO:</label>
                <input type="text" value="admin">
                <label>CONTRASEÑA ASIGNADA:</label>
                <input type="password" value="*****">
            </div>

            <div class="grupo-input">
                <label>NOMBRE COMPLETO:</label>
                <input type="text" class="largo" value="administrador">
            </div>

            <div class="grupo-input">
                <label>DESCRIPCION:</label>
                <textarea rows="3"></textarea>
            </div>

            <div class="tipo-seccion">
                <p>TIPO DE USUARIO:</p>
                <label><input type="radio" name="tipo"> Operador</label><br>
                <label><input type="radio" name="tipo" checked> Administrador</label>
            </div>
        </form>

        <footer class="barra-botones">
            <button class="btn-win">Primero</button>
            <button class="btn-win">Anterior</button>
            <button class="btn-win">Siguiente</button>
            <button class="btn-win">Ultimo</button>
            <button class="btn-win">Nuevo</button>
            <button class="btn-win-resaltado"><u>E</u>ditar</button>
            <button class="btn-win">Guardar</button>
            <button class="btn-win">Deshacer</button>
            <button class="btn-win-salir"><u>S</u>alir</button>
        </footer>
    </div>
</body>
</html>
