<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración de Recursos</title>
    <link rel="stylesheet" href="css/estilos_proyectos.css">
</head>
<body>
    <div class="ventana-sistema">
        <header class="barra-titulo">ADMINISTRACION DE RECURSOS</header>
        <div class="sub-header">ADMINISTRACION DE RECURSOS</div>

        <div class="cuerpo-recursos">
            <div class="panel-izquierdo">
                
                <fieldset class="grupo-cierre-contenedor">
                    <legend>CIERRE DE GESTION</legend>
                    
                    <div class="cierre-columna-izq">
                        <button class="btn-win-azul"><u>C</u>errar Gestion</button>
                        <button class="btn-win-azul">C<u>a</u>mbiar Gestion</button>
                    </div>

                    <div class="cierre-columna-der">
                        <input type="text" value="2013" class="input-gestion">
                        <div class="cuadro-azul-claro"></div>
                    </div>
                </fieldset>
                <div class="botones-verticales">
                    <button class="btn-win-azul">Importar/Exportar</button>
                    <button class="btn-win-azul">Indices UFV</button>
                    <button class="btn-win-azul">Seguridad</button>
                    <button class="btn-win-azul">Re-indexar</button>
                    
                    <div class="contenedor-migrador">
                        <button class="btn-win-azul-resaltado">Migrador</button>
                        
                        <div class="popup-foxpro">
                            <div class="popup-header">Microsoft Visual FoxPro <span class="cerrar">X</span></div>
                            <div class="popup-contenido">
                                <span class="icono-pregunta">?</span>
                                <p>Es usted el unico usuario del sistema</p>
                                <div class="popup-botones">
                                    <button class="btn-win-gris">Sí</button>
                                    <button class="btn-win-gris">No</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="panel-derecho">
                </div>

        </div>
        
        <button class="btn-win-gris salir-der"><u>S</u>alir</button>
    </div>
</body>
</html>
